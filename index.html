<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КНБ — с авторизацией Google</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; text-align: center; }
        button { font-size: 1.2rem; margin: 5px; padding: 8px 16px; cursor: pointer; }
        #user-info { display: flex; justify-content: space-between; align-items: center; background: #f0f0f0; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        #balance { font-weight: bold; color: goldenrod; }
        #result { margin: 20px 0; padding: 10px; background: #e9ecef; border-radius: 8px; }
        ul { text-align: left; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { ConvexClient } from "https://esm.sh/convex@1/browser";
        import React from "https://esm.sh/react@18.2.0";
        import ReactDOM from "https://esm.sh/react-dom@18.2.0/client";
        import { ConvexAuthProvider, useConvexAuth, useAuthActions } from "https://esm.sh/@convex-dev/auth@1.1.2/react?external=react,convex";

        const convexUrl = "https://artful-kudu-355.eu-west-1.convex.site";
        const convex = new ConvexClient(convexUrl);

        // Компонент кнопки входа
        function GoogleSignInButton() {
            const { signIn } = useAuthActions();
            return React.createElement('button', { onClick: () => signIn('google') }, '🔐 Войти через Google');
        }

        // Главный компонент приложения
        function MainApp() {
            const { isAuthenticated, isLoading } = useConvexAuth();
            const { signOut } = useAuthActions();
            const [user, setUser] = React.useState(null);
            const [games, setGames] = React.useState([]);
            const [lastResult, setLastResult] = React.useState("");

            async function loadData() {
                if (!isAuthenticated) return;
                const u = await convex.query("users:getUser");
                setUser(u);
                const history = await convex.query("game:getLastGames");
                setGames(history);
            }

            React.useEffect(() => {
                if (isAuthenticated) {
                    loadData();
                } else {
                    setUser(null);
                    setGames([]);
                    setLastResult("");
                }
            }, [isAuthenticated]);

            async function handlePlay(choice) {
                try {
                    const result = await convex.mutation("game:play", { playerChoice: choice });
                    let msg = "";
                    if (result.result === "win") msg = "🎉 Вы выиграли! +10 монет";
                    else if (result.result === "lose") msg = "😞 Вы проиграли -5 монет";
                    else msg = "🤝 Ничья";
                    setLastResult(`Вы: ${choice} | Компьютер: ${result.computerChoice} — ${msg}`);
                    await loadData();
                } catch (err) {
                    console.error(err);
                    setLastResult("Ошибка при ходе");
                }
            }

            if (isLoading) {
                return React.createElement('div', null, 'Загрузка...');
            }

            if (!isAuthenticated) {
                return React.createElement('div', null,
                    React.createElement('h1', null, 'Камень, ножницы, бумага'),
                    React.createElement(GoogleSignInButton, null)
                );
            }

            return React.createElement('div', null,
                React.createElement('div', { id: 'user-info' },
                    React.createElement('span', null, `👤 ${user?.tokenIdentifier?.slice(-8) || 'Игрок'}`),
                    React.createElement('span', null, '🪙 Баланс: ', React.createElement('span', { id: 'balance' }, user?.coins ?? 0)),
                    React.createElement('button', { onClick: () => signOut().then(() => window.location.reload()) }, 'Выйти')
                ),
                React.createElement('h1', null, 'Сделайте ход'),
                React.createElement('button', { onClick: () => handlePlay('rock') }, '🪨 Камень'),
                React.createElement('button', { onClick: () => handlePlay('paper') }, '📄 Бумага'),
                React.createElement('button', { onClick: () => handlePlay('scissors') }, '✂️ Ножницы'),
                lastResult && React.createElement('div', { id: 'result' }, lastResult),
                React.createElement('h2', null, 'История игр'),
                React.createElement('ul', null,
                    games.map((g, idx) => 
                        React.createElement('li', { key: idx }, `${g.playerChoice} vs ${g.computerChoice} — ${g.result === 'win' ? 'Победа' : g.result === 'lose' ? 'Поражение' : 'Ничья'}`)
                    )
                )
            );
        }

        // Корневой компонент с провайдером авторизации
        function App() {
            return React.createElement(ConvexAuthProvider, { client: convex },
                React.createElement(MainApp, null)
            );
        }

        // Рендеринг в DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
